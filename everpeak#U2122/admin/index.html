<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Admin | Everpeak Visuals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --charcoal: #17181b;
    --charcoal-2: #1f2024;
    --brass: #c9a15a;
    --brass-soft: #e4c98a;
    --paper: #ece7dc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--charcoal);
    color: var(--paper);
    font-family: "Work Sans", sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
  h1 {
    font-family: "Fraunces", serif;
    font-weight: 600;
    color: var(--brass-soft);
    font-size: 1.8rem;
    margin: 0 0 4px;
  }
  p.sub { margin: 0 0 32px; color: rgba(236,231,220,0.55); font-size: 0.9rem; }
  .panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,161,90,0.2);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 28px;
  }
  label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: rgba(236,231,220,0.8); }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 7px;
    border: 1px solid rgba(201,161,90,0.3);
    background: rgba(0,0,0,0.25);
    color: var(--paper);
    font-family: inherit;
    font-size: 0.95rem;
    margin-bottom: 18px;
  }
  input[type="file"] {
    width: 100%;
    margin-bottom: 18px;
    color: rgba(236,231,220,0.7);
    font-size: 0.85rem;
  }
  .row { display: flex; gap: 14px; }
  .row > div { flex: 1; }
  button {
    padding: 11px 20px;
    border-radius: 7px;
    border: none;
    background: linear-gradient(135deg, var(--brass), var(--brass-soft));
    color: #1a1a1a;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.05); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid rgba(201,161,90,0.4);
    color: var(--brass-soft);
  }
  .msg { margin-top: 14px; font-size: 0.85rem; }
  .msg.ok { color: #9fd39f; }
  .msg.err { color: #e08a8a; }
  .gallery-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid rgba(201,161,90,0.12);
    font-size: 0.9rem;
  }
  .gallery-item:last-child { border-bottom: none; }
  .gallery-item a { color: var(--brass-soft); text-decoration: none; }
  .gallery-item a:hover { text-decoration: underline; }
  .meta { color: rgba(236,231,220,0.5); font-size: 0.8rem; }
  #gate {
    max-width: 360px;
    margin: 120px auto;
    text-align: center;
  }
  #gate input { margin-bottom: 14px; }
  .hidden { display: none; }
</style>
</head>
<body>

<div id="gate" class="wrap">
  <h1>Admin</h1>
  <p class="sub">Enter your admin key to manage galleries.</p>
  <input type="password" id="adminKeyInput" placeholder="Admin key">
  <button onclick="unlock()">Unlock</button>
  <div id="gateMsg" class="msg err"></div>
</div>

<div id="app" class="wrap hidden">
  <h1>Gallery Admin</h1>
  <p class="sub">Create a new private gallery, or manage existing ones.</p>

  <div class="panel">
    <label for="clientName">Client name</label>
    <input type="text" id="clientName" placeholder="e.g. The Hendricks Wedding" oninput="autoSlug()">

    <label for="slug">Gallery URL slug</label>
    <input type="text" id="slug" placeholder="e.g. hendricks-wedding">
    <p class="meta" style="margin-top:-10px; margin-bottom:18px;">
      Will be live at: <span id="slugPreview">everpeakvisuals.com/gallery/…</span>
    </p>

    <div class="row">
      <div>
        <label for="password">Gallery password</label>
        <input type="text" id="password" placeholder="Password client will use">
      </div>
    </div>

    <label for="images">Photos</label>
    <input type="file" id="images" multiple accept="image/*">

    <button onclick="createGallery()" id="createBtn">Create gallery</button>
    <div id="createMsg" class="msg"></div>
  </div>

  <div class="panel">
    <h2 style="font-family:'Fraunces',serif; font-weight:600; font-size:1.1rem; color:var(--brass-soft); margin-top:0;">Existing galleries</h2>
    <div id="galleryList"></div>
  </div>
</div>

<script>
  let adminKey = "";

  function unlock() {
    adminKey = document.getElementById("adminKeyInput").value;
    fetch("/admin/galleries", { headers: { "X-Admin-Key": adminKey } })
      .then((r) => {
        if (!r.ok) throw new Error("bad key");
        return r.json();
      })
      .then((data) => {
        document.getElementById("gate").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        renderGalleries(data.galleries);
      })
      .catch(() => {
        document.getElementById("gateMsg").textContent = "Incorrect admin key.";
      });
  }

  function autoSlug() {
    const name = document.getElementById("clientName").value;
    const slugField = document.getElementById("slug");
    if (!slugField.dataset.manual) {
      const auto = name.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
      slugField.value = auto;
      document.getElementById("slugPreview").textContent = "everpeakvisuals.com/gallery/" + (auto || "…");
    }
  }
  document.getElementById("slug").addEventListener("input", (e) => {
    e.target.dataset.manual = "1";
    document.getElementById("slugPreview").textContent = "everpeakvisuals.com/gallery/" + (e.target.value || "…");
  });

  function createGallery() {
    const clientName = document.getElementById("clientName").value.trim();
    const slug = document.getElementById("slug").value.trim();
    const password = document.getElementById("password").value;
    const files = document.getElementById("images").files;
    const msgEl = document.getElementById("createMsg");
    const btn = document.getElementById("createBtn");

    if (!clientName || !password) {
      msgEl.className = "msg err";
      msgEl.textContent = "Client name and password are required.";
      return;
    }

    const formData = new FormData();
    formData.append("clientName", clientName);
    formData.append("slug", slug);
    formData.append("password", password);
    for (const file of files) formData.append("images", file);

    btn.disabled = true;
    msgEl.className = "msg";
    msgEl.textContent = "Uploading...";

    fetch("/admin/galleries", {
      method: "POST",
      headers: { "X-Admin-Key": adminKey },
      body: formData,
    })
      .then((r) => r.json().then((data) => ({ ok: r.ok, data })))
      .then(({ ok, data }) => {
        btn.disabled = false;
        if (!ok) {
          msgEl.className = "msg err";
          msgEl.textContent = data.error || "Something went wrong.";
          return;
        }
        msgEl.className = "msg ok";
        msgEl.textContent = "Created: everpeakvisuals.com" + data.url + " (" + data.photoCount + " photos)";
        document.getElementById("clientName").value = "";
        document.getElementById("slug").value = "";
        document.getElementById("slug").dataset.manual = "";
        document.getElementById("password").value = "";
        document.getElementById("images").value = "";
        refreshList();
      })
      .catch(() => {
        btn.disabled = false;
        msgEl.className = "msg err";
        msgEl.textContent = "Upload failed. Check your connection and try again.";
      });
  }

  function refreshList() {
    fetch("/admin/galleries", { headers: { "X-Admin-Key": adminKey } })
      .then((r) => r.json())
      .then((data) => renderGalleries(data.galleries));
  }

  function renderGalleries(galleries) {
    const el = document.getElementById("galleryList");
    if (!galleries || !galleries.length) {
      el.innerHTML = '<p class="meta">No galleries yet.</p>';
      return;
    }
    el.innerHTML = galleries
      .map(
        (g) => `
      <div class="gallery-item">
        <div>
          <a href="${g.url}" target="_blank">${g.clientName}</a>
          <div class="meta">${g.photoCount} photos &middot; ${new Date(g.createdAt).toLocaleDateString()}</div>
        </div>
        <button class="secondary" onclick="deleteGallery('${g.slug}')">Delete</button>
      </div>`
      )
      .join("");
  }

  function deleteGallery(slug) {
    if (!confirm("Delete this gallery and all its photos? This can't be undone.")) return;
    fetch("/admin/galleries?slug=" + encodeURIComponent(slug), {
      method: "DELETE",
      headers: { "X-Admin-Key": adminKey },
    }).then(refreshList);
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot Availability</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #4caf50;
    --yellow: #ffc107;
    --red: #f44336;
    --blue: #2196f3;
    --yellow-text: #5a3e00;
    --bg: #f5f5f5;
    --card-bg: #fff;
    --text: #1a1a1a;
    --muted: #666;
    --border: rgba(0,0,0,0.1);
    --cell-unset: #eee;
    --cell-unset-text: #999;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --text: #f0f0f0;
      --muted: #aaa;
      --border: rgba(255,255,255,0.1);
      --cell-unset: #2a2a2a;
      --cell-unset-text: #555;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  .page-wrap { max-width: 860px; margin: 0 auto; }

  header {
    background: #1a1a1a;
    color: #fff;
    border-radius: 16px;
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-left h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
  .header-left p  { font-size: 0.85rem; opacity: 0.6; }

  .live-date {
    font-size: 0.85rem;
    background: rgba(255,255,255,0.12);
    padding: 6px 16px;
    border-radius: 20px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    margin-bottom: 1.5rem;
    padding: 1rem 1.25rem;
    background: var(--card-bg);
    border-radius: 12px;
    border: 0.5px solid var(--border);
  }

  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); }
  .legend-dot  { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

  .calendar-card {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    overflow-x: auto;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .cal-month-title { font-size: 1.2rem; font-weight: 600; }

  .cal-nav-btns { display: flex; gap: 8px; }

  .nav-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .nav-btn.today-btn { width: auto; padding: 0 12px; font-size: 12px; }
  .nav-btn:hover { background: var(--cell-unset); }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    min-width: 320px;
  }

  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    padding-bottom: 6px;
    text-transform: uppercase;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(11px, 2vw, 14px);
    font-weight: 500;
  }

  .day-cell.empty      { background: transparent; }
  .day-cell.available  { background: var(--green);  color: #fff; }
  .day-cell.maybe      { background: var(--yellow); color: var(--yellow-text); }
  .day-cell.unavailable{ background: var(--red);    color: #fff; }
  .day-cell.booked     { background: var(--blue);   color: #fff; }
  .day-cell.unset      { background: var(--cell-unset); color: var(--cell-unset-text); }
  .day-cell.today      { box-shadow: 0 0 0 2.5px var(--text); }

  .loading-msg {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 2rem 0;
    grid-column: span 7;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 99;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="page-wrap">

  

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>Available</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffc107"></div>Might not be available</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>Not available</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>Already booked</div>
  </div>

  <div class="calendar-card">
    <div class="cal-nav">
      <div class="cal-month-title" id="calTitle">June 2026</div>
      <div class="cal-nav-btns">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <button class="nav-btn today-btn" onclick="goToToday()">Today</button>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="day-grid" id="dayGrid"><div class="day-label">Sun</div><div class="day-label">Mon</div><div class="day-label">Tue</div><div class="day-label">Wed</div><div class="day-label">Thu</div><div class="day-label">Fri</div><div class="day-label">Sat</div><div class="day-cell empty"></div><div class="day-cell unset">1</div><div class="day-cell unset">2</div><div class="day-cell unset">3</div><div class="day-cell unset">4</div><div class="day-cell unset">5</div><div class="day-cell unset">6</div><div class="day-cell unset">7</div><div class="day-cell unset">8</div><div class="day-cell unset">9</div><div class="day-cell unset">10</div><div class="day-cell unset">11</div><div class="day-cell unset">12</div><div class="day-cell unset">13</div><div class="day-cell unset">14</div><div class="day-cell unset today">15</div><div class="day-cell unset">16</div><div class="day-cell unset">17</div><div class="day-cell unset">18</div><div class="day-cell unset">19</div><div class="day-cell unset">20</div><div class="day-cell unset">21</div><div class="day-cell unset">22</div><div class="day-cell unset">23</div><div class="day-cell unset">24</div><div class="day-cell unset">25</div><div class="day-cell unset">26</div><div class="day-cell unset">27</div><div class="day-cell unset">28</div><div class="day-cell unset">29</div><div class="day-cell unset">30</div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let statuses = {};
let viewYear, viewMonth;
let lastD = -1, lastM = -1, lastY = -1;

async function fetchStatuses() {
  try {
    const r = await fetch('/api/statuses');
    if (r.ok) statuses = await r.json();
  } catch(e) {}
  renderCalendar();
}

function renderCalendar() {
  const now = new Date();
  const tD = now.getDate(), tM = now.getMonth(), tY = now.getFullYear();
  document.getElementById('calTitle').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-label';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  for (let i = 0; i < firstDow; i++) {
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    grid.appendChild(e);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${viewYear}-${viewMonth}-${d}`;
    const status = statuses[key] || 'unset';
    const cell = document.createElement('div');
    cell.className = 'day-cell ' + status;
    cell.textContent = d;
    if (tY === viewYear && tM === viewMonth && tD === d) cell.classList.add('today');
    grid.appendChild(cell);
  }
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderCalendar();
}

function goToToday() {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  renderCalendar();
}

function updateLiveDate() {
  const now = new Date();
  const d = now.getDate(), m = now.getMonth(), y = now.getFullYear();
  const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
  document.getElementById('liveDate').textContent = `${dayName}, ${MONTHS[m]} ${d}, ${y}`;
  if (lastD !== -1) {
    if (y !== lastY)      showToast(`🎉 Happy New Year ${y}!`);
    else if (m !== lastM) showToast(`📅 Welcome to ${MONTHS[m]}!`);
    else if (d !== lastD) showToast(`📆 ${MONTHS[m]} ${d}`);
  }
  if (d !== lastD || m !== lastM || y !== lastY) {
    lastD = d; lastM = m; lastY = y;
    if (viewMonth === m && viewYear === y) renderCalendar();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

const now = new Date();
viewYear = now.getFullYear();
viewMonth = now.getMonth();
updateLiveDate();
fetchStatuses();
setInterval(updateLiveDate, 30000);
setInterval(fetchStatuses, 60000);
</script>


</body></html>

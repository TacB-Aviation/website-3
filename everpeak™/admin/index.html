<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Availability Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #4caf50;
    --yellow: #ffc107;
    --red: #f44336;
    --blue: #2196f3;
    --yellow-text: #5a3e00;
    --bg: #f5f5f5;
    --card-bg: #fff;
    --text: #1a1a1a;
    --muted: #666;
    --border: rgba(0,0,0,0.1);
    --cell-unset: #eee;
    --cell-unset-text: #999;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212; --card-bg: #1e1e1e;
      --text: #f0f0f0; --muted: #aaa;
      --border: rgba(255,255,255,0.1);
      --cell-unset: #2a2a2a; --cell-unset-text: #555;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  .page-wrap { max-width: 860px; margin: 0 auto; }

  header {
    background: #1a1a1a;
    color: #fff;
    border-radius: 16px;
    padding: 1.25rem 1.75rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .header-left h1 { font-size: 1.2rem; font-weight: 600; }
  .header-left p  { font-size: 12px; opacity: 0.55; margin-top: 3px; }

  .owner-badge {
    font-size: 12px;
    background: rgba(255,255,255,0.15);
    padding: 5px 14px;
    border-radius: 20px;
  }

  .mode-card {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
  }

  .mode-card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .mode-bar { display: flex; flex-wrap: wrap; gap: 7px; }

  .mode-btn {
    padding: 7px 15px;
    font-size: 13px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.1s;
  }

  .mode-btn .dot { width: 10px; height: 10px; border-radius: 50%; }
  .mode-btn.active { background: var(--cell-unset); color: var(--text); font-weight: 500; border-color: transparent; }

  .owner-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  .action-btn {
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
  }
  .action-btn:hover { background: var(--cell-unset); }

  .calendar-card {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    overflow-x: auto;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .cal-month-title { font-size: 1.2rem; font-weight: 600; }
  .cal-nav-btns { display: flex; gap: 8px; }

  .nav-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn.today-btn { width: auto; padding: 0 12px; font-size: 12px; }
  .nav-btn:hover { background: var(--cell-unset); }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    min-width: 320px;
  }

  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    padding-bottom: 6px;
    text-transform: uppercase;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(11px, 2vw, 14px);
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
    user-select: none;
  }
  .day-cell:not(.empty):hover { transform: scale(1.08); border-color: rgba(0,0,0,0.2); }
  .day-cell.empty { background: transparent; cursor: default; }
  .day-cell.empty:hover { transform: none; border-color: transparent; }
  .day-cell.available   { background: var(--green);  color: #fff; }
  .day-cell.maybe       { background: var(--yellow); color: var(--yellow-text); }
  .day-cell.unavailable { background: var(--red);    color: #fff; }
  .day-cell.booked      { background: var(--blue);   color: #fff; }
  .day-cell.unset       { background: var(--cell-unset); color: var(--cell-unset-text); }
  .day-cell.today       { box-shadow: 0 0 0 2.5px var(--text); }

  .status-bar {
    margin-top: 1rem;
    font-size: 12.5px;
    color: var(--muted);
    min-height: 18px;
    text-align: center;
  }

  .save-indicator {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
    min-height: 16px;
    transition: opacity 0.4s;
  }

  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a; color: #fff;
    padding: 8px 20px; border-radius: 20px;
    font-size: 13px; opacity: 0;
    pointer-events: none; transition: opacity 0.3s;
    z-index: 99; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  a.public-link {
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px dashed var(--border);
  }
  a.public-link:hover { color: var(--text); }
</style>
</head>
<body>
<div class="page-wrap">

  <header>
    <div class="header-left">
      <h1>🔒 Availability Admin</h1>
      <p>Only you can see this page — <a class="public-link" href="/" style="color:rgba(255,255,255,0.5);">view public calendar →</a></p>
    </div>
    <div class="owner-badge">Owner</div>
  </header>

  <div class="mode-card">
    <div class="mode-card-label">Painting mode — click or drag days</div>
    <div class="mode-bar">
      <button class="mode-btn active" data-mode="available"   onclick="setMode('available',this)">  <span class="dot" style="background:#4caf50"></span>Available</button>
      <button class="mode-btn"        data-mode="maybe"       onclick="setMode('maybe',this)">       <span class="dot" style="background:#ffc107"></span>Maybe</button>
      <button class="mode-btn"        data-mode="unavailable" onclick="setMode('unavailable',this)"><span class="dot" style="background:#f44336"></span>Not available</button>
      <button class="mode-btn"        data-mode="booked"      onclick="setMode('booked',this)">      <span class="dot" style="background:#2196f3"></span>Booked</button>
      <button class="mode-btn"        data-mode="unset"       onclick="setMode('unset',this)">       <span class="dot" style="background:#ccc; border:1px solid #aaa"></span>Clear</button>
    </div>
    <div class="owner-actions">
      <button class="action-btn" onclick="clearMonth()">🗑 Clear this month</button>
    </div>
  </div>

  <div class="calendar-card">
    <div class="cal-nav">
      <div class="cal-month-title" id="calTitle"></div>
      <div class="cal-nav-btns">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <button class="nav-btn today-btn" onclick="goToToday()">Today</button>
        <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
    </div>
    <div class="day-grid" id="dayGrid"></div>
    <div class="status-bar" id="statusBar">Pick a mode above, then click any day.</div>
    <div class="save-indicator" id="saveIndicator"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const STATUS_LABELS = { available:'Available', maybe:'Might not be available', unavailable:'Not available', booked:'Already booked', unset:'Cleared' };

let statuses = {};
let currentMode = 'available';
let isDragging = false;
let viewYear, viewMonth;
let saveTimer = null;

async function fetchStatuses() {
  try {
    const r = await fetch('/api/statuses');
    if (r.ok) { statuses = await r.json(); renderCalendar(); }
  } catch(e) {}
}

async function saveStatuses() {
  setSaveIndicator('Saving…');
  try {
    const r = await fetch('/api/statuses', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(statuses)
    });
    setSaveIndicator(r.ok ? '✓ Saved' : '⚠ Save failed');
  } catch(e) {
    setSaveIndicator('⚠ Save failed — check connection');
  }
  setTimeout(() => setSaveIndicator(''), 3000);
}

function setSaveIndicator(msg) {
  document.getElementById('saveIndicator').textContent = msg;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveStatuses, 800);
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderCalendar();
}

function goToToday() {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  renderCalendar();
}

function renderCalendar() {
  const now = new Date();
  const tD = now.getDate(), tM = now.getMonth(), tY = now.getFullYear();
  document.getElementById('calTitle').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-label';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  for (let i = 0; i < firstDow; i++) {
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    grid.appendChild(e);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${viewYear}-${viewMonth}-${d}`;
    const status = statuses[key] || 'unset';
    const cell = document.createElement('div');
    cell.className = 'day-cell ' + status;
    cell.textContent = d;
    cell.dataset.key = key;
    cell.dataset.d = d;
    cell.dataset.m = viewMonth;
    cell.dataset.y = viewYear;
    if (tY === viewYear && tM === viewMonth && tD === d) cell.classList.add('today');
    cell.addEventListener('mousedown', e => { isDragging = true; applyStatus(cell); e.preventDefault(); });
    cell.addEventListener('mouseenter', () => { if (isDragging) applyStatus(cell); });
    grid.appendChild(cell);
  }
}

function applyStatus(cell) {
  if (cell.classList.contains('empty')) return;
  const key = cell.dataset.key;
  const d = cell.dataset.d, m = parseInt(cell.dataset.m), y = cell.dataset.y;
  if (currentMode === 'unset') delete statuses[key]; else statuses[key] = currentMode;
  const s = statuses[key] || 'unset';
  const now = new Date();
  cell.className = 'day-cell ' + s;
  if (parseInt(y) === now.getFullYear() && m === now.getMonth() && parseInt(d) === now.getDate()) {
    cell.classList.add('today');
  }
  document.getElementById('statusBar').textContent = `${MONTHS[m]} ${d} → ${STATUS_LABELS[s]}`;
  scheduleSave();
}

document.addEventListener('mouseup', () => { isDragging = false; });

function clearMonth() {
  if (!confirm(`Clear all days in ${MONTHS[viewMonth]} ${viewYear}?`)) return;
  for (let d = 1; d <= 31; d++) delete statuses[`${viewYear}-${viewMonth}-${d}`];
  renderCalendar();
  scheduleSave();
  showToast('Month cleared');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

const now = new Date();
viewYear = now.getFullYear();
viewMonth = now.getMonth();
fetchStatuses();
</script>
</body>
</html>
